<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Scrollytelling Itinerary</title>

  <!-- MapLibre GL JS (latest major via CDN) -->
  <link
    href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #f5f7fb;
      --text: #1d2939;
      --muted: #475467;
      --card-bg: #ffffff;
      --card-border: #e4e7ec;
      --shadow: 0 8px 26px rgba(16, 24, 40, 0.08);
      --active-shadow: 0 14px 34px rgba(0, 106, 255, 0.18);
      --active-border: #98b9ff;
      --accent: #006aff;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.45;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 40% 60%;
      position: relative;
    }

    .story-pane {
      position: relative;
      z-index: 3;
      overflow-y: auto;
      height: 100vh;
      padding: 2rem 1.1rem 8rem;
      background:
        radial-gradient(circle at 10% 0%, rgba(0, 106, 255, 0.08), transparent 32%),
        linear-gradient(180deg, #f9fbff 0%, #f2f4f8 100%);
      border-right: 1px solid #eaecf0;
      scroll-snap-type: y proximity;
    }

    .story-inner {
      max-width: 560px;
      margin: 0 auto;
      padding-bottom: 30vh;
    }

    .title-block {
      margin: 0 0 1.2rem;
      padding: 0.25rem 0.25rem 0.8rem;
    }

    .title-block h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.6rem, 2.8vw, 2.2rem);
      letter-spacing: 0.2px;
    }

    .title-block p {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .controls {
      display: flex;
      gap: 0.55rem;
      margin: 0.9rem 0 1.2rem;
      position: sticky;
      top: 0.6rem;
      z-index: 8;
      background: rgba(249, 251, 255, 0.9);
      backdrop-filter: blur(6px);
      border: 1px solid #e4e7ec;
      border-radius: 12px;
      padding: 0.5rem;
    }

    .nav-btn {
      border: 1px solid #cfd4dc;
      background: #ffffff;
      color: #0f172a;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      padding: 0.52rem 0.9rem;
      cursor: pointer;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .nav-btn:hover:not(:disabled) {
      background: #f8fafc;
      border-color: #94a3b8;
      transform: translateY(-1px);
    }

    .nav-btn:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.8rem;
    }

    .mini-btn {
      border: 1px solid #d0d5dd;
      background: #ffffff;
      color: #344054;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.28rem 0.58rem;
      cursor: pointer;
    }

    .mini-btn:hover {
      background: #f8fafc;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1rem 1rem 1.1rem;
      margin: 0 0 1rem;
      scroll-snap-align: center;
      opacity: 0.65;
      transform: translateY(18px) scale(0.985);
      transition:
        opacity 260ms ease,
        transform 320ms ease,
        box-shadow 320ms ease,
        border-color 320ms ease;
    }

    .step-card.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      box-shadow: var(--active-shadow);
      border-color: var(--active-border);
    }

    .step-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.7rem;
      height: 1.7rem;
      border-radius: 999px;
      background: #eef4ff;
      color: #1d4ed8;
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
    }

    .step-card h2 {
      margin: 0 0 0.4rem;
      font-size: 1.1rem;
      line-height: 1.3;
    }

    .step-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.97rem;
    }

    .map-pane {
      position: relative;
      height: 100vh;
      overflow: hidden;
      background: #dbe6f7;
    }

    #map {
      position: fixed;
      top: 0;
      right: 0;
      width: 60%;
      height: 100vh;
      z-index: 1;
    }

    .custom-marker {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #ffffff;
      background: var(--accent);
      box-shadow: 0 0 0 7px rgba(0, 106, 255, 0.22);
      transition: transform 220ms ease;
    }

    .custom-marker:hover {
      transform: scale(1.15);
    }

    .maplibregl-popup-content {
      border-radius: 10px;
      font-family: inherit;
      padding: 10px 12px;
    }

    @media (max-width: 900px) {
      .app {
        display: block;
      }

      .map-pane {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 52vh;
        z-index: 1;
      }

      #map {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 52vh;
      }

      .story-pane {
        position: relative;
        z-index: 3;
        margin-top: 46vh;
        min-height: 54vh;
        height: auto;
        border-right: none;
        border-top-left-radius: 18px;
        border-top-right-radius: 18px;
        box-shadow: 0 -12px 30px rgba(16, 24, 40, 0.16);
        padding-top: 1rem;
      }

      .story-inner {
        max-width: 700px;
      }

      .step-card {
        opacity: 0.82;
      }

      .controls {
        top: 0.35rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="story-pane" id="storyPane">
      <div class="story-inner">
        <header class="title-block">
          <h1>Travel Itinerary</h1>
          <p>Use Prev/Next to animate the map between stops.</p>
        </header>
        <div class="controls">
          <button id="prevBtn" class="nav-btn" type="button">Prev</button>
          <button id="nextBtn" class="nav-btn" type="button">Next</button>
          <button id="addBtn" class="nav-btn" type="button">Add Stop</button>
        </div>
        <div id="cards"></div>
      </div>
    </section>

    <aside class="map-pane" aria-label="Map panel">
      <div id="map"></div>
    </aside>
  </div>

  <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
  <script>
    /*
      INSERT YOUR CUSTOM LOCATIONS HERE:
      - Add/remove objects in this array.
      - Each object needs: title, description, longitude, latitude, zoomLevel.
    */
    let itineraryStops = [
      {
        title: "Golden Gate Bridge",
        description: "Sunrise walk with views of the bay and Marin Headlands.",
        longitude: -122.4783,
        latitude: 37.8199,
        zoomLevel: 12.7
      },
      {
        title: "Yosemite Valley",
        description: "Afternoon at Tunnel View and lower Yosemite Falls.",
        longitude: -119.573,
        latitude: 37.7456,
        zoomLevel: 11.6
      },
      {
        title: "Las Vegas Strip",
        description: "Evening lights, shows, and a late-night food stop.",
        longitude: -115.1728,
        latitude: 36.1147,
        zoomLevel: 12.8
      },
      {
        title: "Grand Canyon South Rim",
        description: "Golden-hour overlook at Mather Point and nearby trails.",
        longitude: -112.1401,
        latitude: 36.0544,
        zoomLevel: 11.4
      },
      {
        title: "Santa Monica Pier",
        description: "Trip finale by the Pacific with sunset boardwalk views.",
        longitude: -118.4961,
        latitude: 34.0094,
        zoomLevel: 13
      }
    ];

    // OpenStreetMap raster style (global street data, no API key).
    const osmRasterStyle = {
      version: 8,
      name: "OpenStreetMap Raster",
      sources: {
        "osm-raster-tiles": {
          type: "raster",
          tiles: [
            "https://a.tile.openstreetmap.org/{z}/{x}/{y}.png",
            "https://b.tile.openstreetmap.org/{z}/{x}/{y}.png",
            "https://c.tile.openstreetmap.org/{z}/{x}/{y}.png"
          ],
          tileSize: 256,
          maxzoom: 19,
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap contributors</a>'
        }
      },
      layers: [
        {
          id: "osm-raster-layer",
          type: "raster",
          source: "osm-raster-tiles",
          minzoom: 0
        }
      ]
    };

    const map = new maplibregl.Map({
      container: "map",
      style: osmRasterStyle,
      center: [itineraryStops[0].longitude, itineraryStops[0].latitude],
      zoom: itineraryStops[0].zoomLevel + 0.8,
      maxZoom: 18,
      pitch: 0,
      bearing: 0,
      antialias: true
    });

    map.addControl(new maplibregl.NavigationControl(), "top-right");
    map.addControl(new maplibregl.ScaleControl({ maxWidth: 130, unit: "imperial" }), "bottom-right");

    const cardsContainer = document.getElementById("cards");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const addBtn = document.getElementById("addBtn");
    let cardElements = [];
    let markers = [];
    let activeIndex = -1;
    let mapLoaded = false;

    /*
      TWEAK MAP FLIGHT ANIMATION HERE:
      - duration (ms): total animation speed
      - speed/curve: feel of movement
      - pitch/bearing: cinematic camera angle
    */
    function flyToStop(index) {
      const stop = itineraryStops[index];
      if (!stop) return;

      activeIndex = index;

      cardElements.forEach((el, i) => {
        el.classList.toggle("active", i === index);
      });

      if (prevBtn) prevBtn.disabled = index === 0;
      if (nextBtn) nextBtn.disabled = index === itineraryStops.length - 1;

      map.flyTo({
        center: [stop.longitude, stop.latitude],
        zoom: Math.min(stop.zoomLevel + 0.8, 18),
        duration: 2600,
        speed: 0.55,
        curve: 1.45,
        essential: true,
        pitch: 0,
        bearing: 0
      });

      const activeCard = cardElements[index];
      if (activeCard) {
        activeCard.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }

    function updateNavButtons() {
      const noStops = itineraryStops.length === 0;
      if (prevBtn) prevBtn.disabled = noStops || activeIndex <= 0;
      if (nextBtn) nextBtn.disabled = noStops || activeIndex >= itineraryStops.length - 1;
    }

    function renderCards() {
      cardsContainer.innerHTML = "";
      cardElements = [];

      itineraryStops.forEach((stop, index) => {
        const card = document.createElement("article");
        card.className = "step-card";
        card.id = `card-${index}`;
        card.dataset.index = String(index);
        card.innerHTML = `
          <span class="step-index">${index + 1}</span>
          <h2>${stop.title}</h2>
          <p>${stop.description}</p>
          <div class="card-actions">
            <button class="mini-btn edit-btn" type="button">Edit</button>
            <button class="mini-btn delete-btn" type="button">Delete</button>
          </div>
        `;

        card.addEventListener("click", () => {
          flyToStop(index);
        });

        const editBtn = card.querySelector(".edit-btn");
        const deleteBtn = card.querySelector(".delete-btn");

        if (editBtn) {
          editBtn.addEventListener("click", (event) => {
            event.stopPropagation();
            editStop(index);
          });
        }

        if (deleteBtn) {
          deleteBtn.addEventListener("click", (event) => {
            event.stopPropagation();
            deleteStop(index);
          });
        }

        cardsContainer.appendChild(card);
        cardElements.push(card);
      });

      cardElements.forEach((el, i) => {
        el.classList.toggle("active", i === activeIndex);
      });

      updateNavButtons();
    }

    function renderMarkers() {
      markers.forEach((marker) => marker.remove());
      markers = [];

      itineraryStops.forEach((stop) => {
        const markerEl = document.createElement("div");
        markerEl.className = "custom-marker";

        const marker = new maplibregl.Marker({ element: markerEl, anchor: "center" })
          .setLngLat([stop.longitude, stop.latitude])
          .setPopup(new maplibregl.Popup({ offset: 20 }).setHTML(`<strong>${stop.title}</strong>`))
          .addTo(map);

        markers.push(marker);
      });
    }

    function refreshRouteLayer() {
      if (!mapLoaded) return;

      const routeCoordinates = itineraryStops.map((stop) => [stop.longitude, stop.latitude]);
      const routeData = {
        type: "FeatureCollection",
        features: routeCoordinates.length >= 2
          ? [
              {
                type: "Feature",
                geometry: {
                  type: "LineString",
                  coordinates: routeCoordinates
                },
                properties: {}
              }
            ]
          : []
      };

      if (!map.getSource("trip-route")) {
        map.addSource("trip-route", {
          type: "geojson",
          data: routeData
        });

        map.addLayer({
          id: "trip-route-glow",
          type: "line",
          source: "trip-route",
          paint: {
            "line-color": "#60a5fa",
            "line-width": 7,
            "line-opacity": 0.45
          }
        });

        map.addLayer({
          id: "trip-route-line",
          type: "line",
          source: "trip-route",
          layout: {
            "line-cap": "round",
            "line-join": "round"
          },
          paint: {
            "line-color": "#1d4ed8",
            "line-width": 3
          }
        });
      } else {
        map.getSource("trip-route").setData(routeData);
      }
    }

    async function searchLocation(defaultQuery = "") {
      const query = prompt("Search for a place or address", defaultQuery);
      if (query === null) return null;
      if (!query.trim()) {
        alert("Please enter a place or address.");
        return null;
      }

      try {
        const response = await fetch(
          `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=5&q=${encodeURIComponent(query.trim())}`,
          { headers: { Accept: "application/json" } }
        );

        if (!response.ok) {
          alert("Location search failed. Please try again.");
          return null;
        }

        const results = await response.json();
        if (!Array.isArray(results) || results.length === 0) {
          alert("No matching locations found.");
          return null;
        }

        const options = results
          .map((result, idx) => `${idx + 1}. ${result.display_name}`)
          .join("\n");

        const selectedIdxText = prompt(`Choose a result number:\n\n${options}`, "1");
        if (selectedIdxText === null) return null;

        const selectedIdx = Number.parseInt(selectedIdxText, 10) - 1;
        if (selectedIdx < 0 || selectedIdx >= results.length) {
          alert("Invalid selection number.");
          return null;
        }

        return results[selectedIdx];
      } catch (error) {
        alert("Location search failed. Check your internet connection and try again.");
        return null;
      }
    }

    async function getStopInput(defaults = {}) {
      const selectedLocation = await searchLocation(defaults.searchQuery || defaults.title || "");
      if (!selectedLocation) return null;

      const suggestedTitle = selectedLocation.display_name.split(",")[0].trim();
      const title = prompt("Stop title", defaults.title || suggestedTitle);
      if (title === null) return null;

      const description = prompt("Stop description", defaults.description || "");
      if (description === null) return null;

      const zoomText = prompt("Zoom level", String(defaults.zoomLevel ?? 12));
      if (zoomText === null) return null;
      const zoomLevel = Number.parseFloat(zoomText);

      if (!Number.isFinite(zoomLevel)) {
        alert("Please enter a valid number for zoom.");
        return null;
      }

      return {
        title,
        description,
        longitude: Number.parseFloat(selectedLocation.lon),
        latitude: Number.parseFloat(selectedLocation.lat),
        zoomLevel,
        searchQuery: selectedLocation.display_name
      };
    }

    async function addStop() {
      const newStop = await getStopInput({
        title: "New Stop",
        description: "Describe this location.",
        zoomLevel: 12
      });
      if (!newStop) return;

      itineraryStops.push(newStop);
      renderCards();
      renderMarkers();
      refreshRouteLayer();
      flyToStop(itineraryStops.length - 1);
    }

    async function editStop(index) {
      const currentStop = itineraryStops[index];
      if (!currentStop) return;

      const updatedStop = await getStopInput(currentStop);
      if (!updatedStop) return;

      itineraryStops[index] = updatedStop;
      renderCards();
      renderMarkers();
      refreshRouteLayer();
      flyToStop(index);
    }

    function deleteStop(index) {
      if (!itineraryStops[index]) return;
      if (!confirm("Remove this stop from the itinerary?")) return;

      itineraryStops.splice(index, 1);

      if (itineraryStops.length === 0) {
        activeIndex = -1;
      } else if (activeIndex > index) {
        activeIndex -= 1;
      } else if (activeIndex >= itineraryStops.length) {
        activeIndex = itineraryStops.length - 1;
      }

      renderCards();
      renderMarkers();
      refreshRouteLayer();

      if (activeIndex >= 0) {
        flyToStop(activeIndex);
      } else {
        updateNavButtons();
      }
    }

    // Initialize first location.
    map.on("load", () => {
      mapLoaded = true;
      renderMarkers();
      refreshRouteLayer();
      if (itineraryStops.length > 0) {
        flyToStop(Math.max(activeIndex, 0));
      } else {
        updateNavButtons();
      }
    });

    if (prevBtn) {
      prevBtn.addEventListener("click", () => {
        if (activeIndex > 0) flyToStop(activeIndex - 1);
      });
    }

    if (nextBtn) {
      nextBtn.addEventListener("click", () => {
        if (activeIndex < itineraryStops.length - 1) flyToStop(activeIndex + 1);
      });
    }

    if (addBtn) {
      addBtn.addEventListener("click", addStop);
    }

    renderCards();
  </script>
</body>
</html>
