<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Itinerary Map</title>

  <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html,
    body,
    #app {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    .maplibregl-popup-content {
      border-radius: 10px;
      font-family: inherit;
      padding: 10px 12px;
    }

    .custom-marker {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid #ffffff;
      background: #2563eb;
      box-shadow: 0 0 0 6px rgba(37, 99, 235, 0.22);
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="app" class="h-full">
    <div class="grid h-full md:grid-cols-[40%_60%]">
      <section class="relative z-20 h-full overflow-y-auto border-r border-slate-200 bg-gradient-to-b from-slate-50 to-slate-100 p-4 pb-32">
        <div class="mx-auto max-w-2xl">
          <header class="mb-3">
            <h1 class="text-2xl font-bold tracking-tight">Travel Itinerary</h1>
            <p class="text-sm text-slate-600">Inline edit stops, search places with autocomplete, and drag to reorder.</p>
          </header>

          <div class="sticky top-2 z-30 mb-4 rounded-xl border border-slate-200 bg-white/90 p-3 shadow-sm backdrop-blur">
            <div class="mb-2 flex gap-2">
              <button
                type="button"
                class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
                :disabled="activeIndex <= 0"
                @click="goPrev"
              >
                Prev
              </button>
              <button
                type="button"
                class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
                :disabled="activeIndex >= stops.length - 1 || stops.length === 0"
                @click="goNext"
              >
                Next
              </button>
            </div>

            <div class="space-y-2">
              <div class="relative">
                <input
                  v-model.trim="addForm.query"
                  @input="onAddQueryInput"
                  @focus="showAddSuggestions = true"
                  @keydown.down.prevent="moveAddSelection(1)"
                  @keydown.up.prevent="moveAddSelection(-1)"
                  @keydown.enter.prevent="selectHighlightedAdd"
                  @keydown.esc="showAddSuggestions = false"
                  placeholder="Search place or address"
                  class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2"
                />

                <div
                  v-if="showAddSuggestions && addSuggestions.length"
                  class="absolute z-40 mt-1 max-h-56 w-full overflow-y-auto rounded-lg border border-slate-200 bg-white shadow-lg"
                >
                  <button
                    v-for="(item, idx) in addSuggestions"
                    :key="item.place_id"
                    type="button"
                    class="block w-full px-3 py-2 text-left text-sm hover:bg-slate-100"
                    :class="idx === addHighlighted ? 'bg-slate-100' : ''"
                    @mousedown.prevent="selectAddSuggestion(item)"
                  >
                    {{ item.display_name }}
                  </button>
                </div>
              </div>

              <input v-model.trim="addForm.title" placeholder="Title" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2" />
              <textarea v-model.trim="addForm.description" rows="2" placeholder="Description" class="w-full resize-y rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2"></textarea>

              <div class="flex items-center gap-2">
                <input v-model.number="addForm.zoomLevel" type="number" min="2" max="18" step="0.1" class="w-28 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2" />
                <button
                  type="button"
                  class="rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
                  :disabled="!canAddStop"
                  @click="addStop"
                >
                  Add Stop
                </button>
              </div>
            </div>
          </div>

          <div ref="cardsList" class="space-y-3">
            <article
              v-for="(stop, index) in stops"
              :key="stop.id"
              :id="`card-${stop.id}`"
              class="rounded-2xl border bg-white p-4 shadow transition"
              :class="index === activeIndex ? 'border-blue-300 shadow-blue-100' : 'border-slate-200'"
              @click="flyToStop(index)"
            >
              <div class="mb-2 inline-flex h-7 w-7 items-center justify-center rounded-full bg-blue-50 text-xs font-bold text-blue-700">
                {{ index + 1 }}
              </div>

              <template v-if="editingStopId !== stop.id">
                <h2 class="mb-1 text-lg font-semibold">{{ stop.title }}</h2>
                <p class="text-sm text-slate-600">{{ stop.description }}</p>
                <div class="mt-3 flex gap-2">
                  <button type="button" class="rounded-md border border-slate-300 px-2.5 py-1.5 text-xs font-semibold hover:bg-slate-50" @click.stop="startEdit(stop)">Edit</button>
                  <button type="button" class="rounded-md border border-rose-300 px-2.5 py-1.5 text-xs font-semibold text-rose-700 hover:bg-rose-50" @click.stop="deleteStop(index)">Delete</button>
                </div>
              </template>

              <template v-else>
                <div class="space-y-2" @click.stop>
                  <div class="relative">
                    <input
                      v-model.trim="editForm.query"
                      @input="onEditQueryInput"
                      @focus="showEditSuggestions = true"
                      @keydown.down.prevent="moveEditSelection(1)"
                      @keydown.up.prevent="moveEditSelection(-1)"
                      @keydown.enter.prevent="selectHighlightedEdit"
                      @keydown.esc="showEditSuggestions = false"
                      placeholder="Search new place/address"
                      class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2"
                    />

                    <div
                      v-if="showEditSuggestions && editSuggestions.length"
                      class="absolute z-40 mt-1 max-h-56 w-full overflow-y-auto rounded-lg border border-slate-200 bg-white shadow-lg"
                    >
                      <button
                        v-for="(item, idx) in editSuggestions"
                        :key="item.place_id"
                        type="button"
                        class="block w-full px-3 py-2 text-left text-sm hover:bg-slate-100"
                        :class="idx === editHighlighted ? 'bg-slate-100' : ''"
                        @mousedown.prevent="selectEditSuggestion(item)"
                      >
                        {{ item.display_name }}
                      </button>
                    </div>
                  </div>

                  <input v-model.trim="editForm.title" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2" />
                  <textarea v-model.trim="editForm.description" rows="2" class="w-full resize-y rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2"></textarea>
                  <input v-model.number="editForm.zoomLevel" type="number" min="2" max="18" step="0.1" class="w-28 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2" />

                  <div class="flex gap-2">
                    <button type="button" class="rounded-md bg-blue-600 px-2.5 py-1.5 text-xs font-semibold text-white hover:bg-blue-700" @click="saveEdit">Save</button>
                    <button type="button" class="rounded-md border border-slate-300 px-2.5 py-1.5 text-xs font-semibold hover:bg-slate-50" @click="cancelEdit">Cancel</button>
                  </div>
                </div>
              </template>
            </article>
          </div>
        </div>
      </section>

      <aside class="relative h-full">
        <div id="map" class="fixed right-0 top-0 h-full w-full md:w-[60%]"></div>
      </aside>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

  <script>
    const { createApp, nextTick } = Vue;

    createApp({
      data() {
        return {
          stops: [
            {
              id: 1,
              title: "Golden Gate Bridge",
              description: "Sunrise walk with views of the bay and Marin Headlands.",
              longitude: -122.4783,
              latitude: 37.8199,
              zoomLevel: 12.7,
              searchQuery: "Golden Gate Bridge"
            },
            {
              id: 2,
              title: "Yosemite Valley",
              description: "Afternoon at Tunnel View and lower Yosemite Falls.",
              longitude: -119.573,
              latitude: 37.7456,
              zoomLevel: 11.6,
              searchQuery: "Yosemite Valley"
            },
            {
              id: 3,
              title: "Las Vegas Strip",
              description: "Evening lights, shows, and a late-night food stop.",
              longitude: -115.1728,
              latitude: 36.1147,
              zoomLevel: 12.8,
              searchQuery: "Las Vegas Strip"
            },
            {
              id: 4,
              title: "Grand Canyon South Rim",
              description: "Golden-hour overlook at Mather Point and nearby trails.",
              longitude: -112.1401,
              latitude: 36.0544,
              zoomLevel: 11.4,
              searchQuery: "Grand Canyon South Rim"
            },
            {
              id: 5,
              title: "Santa Monica Pier",
              description: "Trip finale by the Pacific with sunset boardwalk views.",
              longitude: -118.4961,
              latitude: 34.0094,
              zoomLevel: 13,
              searchQuery: "Santa Monica Pier"
            }
          ],
          nextId: 6,
          activeIndex: 0,
          map: null,
          mapLoaded: false,
          markers: [],

          addForm: {
            query: "",
            title: "",
            description: "",
            zoomLevel: 12,
            latitude: null,
            longitude: null,
            searchQuery: ""
          },
          addSuggestions: [],
          addHighlighted: -1,
          showAddSuggestions: false,
          addSearchTimer: null,

          editingStopId: null,
          editForm: {
            query: "",
            title: "",
            description: "",
            zoomLevel: 12,
            latitude: null,
            longitude: null,
            searchQuery: ""
          },
          editSuggestions: [],
          editHighlighted: -1,
          showEditSuggestions: false,
          editSearchTimer: null
        };
      },

      computed: {
        canAddStop() {
          return (
            this.addForm.title.trim() &&
            this.addForm.description.trim() &&
            Number.isFinite(this.addForm.zoomLevel) &&
            Number.isFinite(this.addForm.latitude) &&
            Number.isFinite(this.addForm.longitude)
          );
        }
      },

      methods: {
        initMap() {
          const first = this.stops[0] || { longitude: -98.58, latitude: 39.82, zoomLevel: 3.8 };

          const osmRasterStyle = {
            version: 8,
            name: "OpenStreetMap Raster",
            sources: {
              "osm-raster-tiles": {
                type: "raster",
                tiles: [
                  "https://a.tile.openstreetmap.org/{z}/{x}/{y}.png",
                  "https://b.tile.openstreetmap.org/{z}/{x}/{y}.png",
                  "https://c.tile.openstreetmap.org/{z}/{x}/{y}.png"
                ],
                tileSize: 256,
                maxzoom: 19,
                attribution:
                  '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap contributors</a>'
              }
            },
            layers: [{ id: "osm-raster", type: "raster", source: "osm-raster-tiles" }]
          };

          this.map = new maplibregl.Map({
            container: "map",
            style: osmRasterStyle,
            center: [first.longitude, first.latitude],
            zoom: Math.min((first.zoomLevel || 12) + 0.8, 18),
            maxZoom: 18,
            pitch: 0,
            bearing: 0
          });

          this.map.addControl(new maplibregl.NavigationControl(), "top-right");
          this.map.addControl(new maplibregl.ScaleControl({ maxWidth: 130, unit: "imperial" }), "bottom-right");

          this.map.on("load", () => {
            this.mapLoaded = true;
            this.syncMapData();
            if (this.stops.length) {
              this.flyToStop(this.activeIndex, false);
            }
          });
        },

        syncMapData() {
          if (!this.mapLoaded) return;
          this.renderMarkers();
          this.refreshRouteLayer();
        },

        renderMarkers() {
          this.markers.forEach((marker) => marker.remove());
          this.markers = [];

          this.stops.forEach((stop) => {
            const markerEl = document.createElement("div");
            markerEl.className = "custom-marker";

            const marker = new maplibregl.Marker({ element: markerEl, anchor: "center" })
              .setLngLat([stop.longitude, stop.latitude])
              .setPopup(new maplibregl.Popup({ offset: 18 }).setHTML(`<strong>${stop.title}</strong>`))
              .addTo(this.map);

            this.markers.push(marker);
          });
        },

        refreshRouteLayer() {
          const coords = this.stops.map((s) => [s.longitude, s.latitude]);
          const data = {
            type: "FeatureCollection",
            features: coords.length >= 2
              ? [{ type: "Feature", properties: {}, geometry: { type: "LineString", coordinates: coords } }]
              : []
          };

          if (!this.map.getSource("trip-route")) {
            this.map.addSource("trip-route", { type: "geojson", data });
            this.map.addLayer({
              id: "trip-route-glow",
              type: "line",
              source: "trip-route",
              paint: { "line-color": "#60a5fa", "line-width": 7, "line-opacity": 0.45 }
            });
            this.map.addLayer({
              id: "trip-route-line",
              type: "line",
              source: "trip-route",
              layout: { "line-cap": "round", "line-join": "round" },
              paint: { "line-color": "#1d4ed8", "line-width": 3 }
            });
          } else {
            this.map.getSource("trip-route").setData(data);
          }
        },

        flyToStop(index, shouldScroll = true) {
          if (index < 0 || index >= this.stops.length) return;
          const stop = this.stops[index];
          this.activeIndex = index;

          if (this.mapLoaded) {
            this.map.flyTo({
              center: [stop.longitude, stop.latitude],
              zoom: Math.min((stop.zoomLevel || 12) + 0.8, 18),
              duration: 1600,
              essential: true,
              pitch: 0,
              bearing: 0
            });
          }

          if (shouldScroll) {
            nextTick(() => {
              const el = document.getElementById(`card-${stop.id}`);
              if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
            });
          }
        },

        goPrev() {
          if (this.activeIndex > 0) this.flyToStop(this.activeIndex - 1);
        },

        goNext() {
          if (this.activeIndex < this.stops.length - 1) this.flyToStop(this.activeIndex + 1);
        },

        async fetchSuggestions(query) {
          const q = query.trim();
          if (!q) return [];
          const response = await fetch(
            `https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=6&q=${encodeURIComponent(q)}`,
            { headers: { Accept: "application/json" } }
          );
          if (!response.ok) return [];
          const data = await response.json();
          return Array.isArray(data) ? data : [];
        },

        debounceSearch(type) {
          const timerKey = type === "add" ? "addSearchTimer" : "editSearchTimer";
          if (this[timerKey]) clearTimeout(this[timerKey]);

          this[timerKey] = setTimeout(async () => {
            if (type === "add") {
              this.addSuggestions = await this.fetchSuggestions(this.addForm.query);
              this.addHighlighted = this.addSuggestions.length ? 0 : -1;
              this.showAddSuggestions = true;
            } else {
              this.editSuggestions = await this.fetchSuggestions(this.editForm.query);
              this.editHighlighted = this.editSuggestions.length ? 0 : -1;
              this.showEditSuggestions = true;
            }
          }, 280);
        },

        onAddQueryInput() {
          this.debounceSearch("add");
        },

        moveAddSelection(step) {
          if (!this.addSuggestions.length) return;
          const len = this.addSuggestions.length;
          this.addHighlighted = (this.addHighlighted + step + len) % len;
        },

        selectHighlightedAdd() {
          if (this.addHighlighted < 0 || this.addHighlighted >= this.addSuggestions.length) return;
          this.selectAddSuggestion(this.addSuggestions[this.addHighlighted]);
        },

        selectAddSuggestion(item) {
          this.addForm.query = item.display_name;
          this.addForm.searchQuery = item.display_name;
          this.addForm.latitude = Number.parseFloat(item.lat);
          this.addForm.longitude = Number.parseFloat(item.lon);
          if (!this.addForm.title.trim()) {
            this.addForm.title = item.display_name.split(",")[0].trim();
          }
          this.showAddSuggestions = false;
        },

        addStop() {
          if (!this.canAddStop) return;
          this.stops.push({
            id: this.nextId++,
            title: this.addForm.title.trim(),
            description: this.addForm.description.trim(),
            longitude: this.addForm.longitude,
            latitude: this.addForm.latitude,
            zoomLevel: Math.max(2, Math.min(18, Number(this.addForm.zoomLevel) || 12)),
            searchQuery: this.addForm.searchQuery || this.addForm.query
          });

          this.syncMapData();
          this.flyToStop(this.stops.length - 1);

          this.addForm = {
            query: "",
            title: "",
            description: "",
            zoomLevel: 12,
            latitude: null,
            longitude: null,
            searchQuery: ""
          };
          this.addSuggestions = [];
          this.addHighlighted = -1;
          this.showAddSuggestions = false;
        },

        startEdit(stop) {
          this.editingStopId = stop.id;
          this.editForm = {
            query: stop.searchQuery || stop.title,
            title: stop.title,
            description: stop.description,
            zoomLevel: stop.zoomLevel,
            latitude: stop.latitude,
            longitude: stop.longitude,
            searchQuery: stop.searchQuery || stop.title
          };
          this.editSuggestions = [];
          this.editHighlighted = -1;
          this.showEditSuggestions = false;
        },

        onEditQueryInput() {
          this.debounceSearch("edit");
        },

        moveEditSelection(step) {
          if (!this.editSuggestions.length) return;
          const len = this.editSuggestions.length;
          this.editHighlighted = (this.editHighlighted + step + len) % len;
        },

        selectHighlightedEdit() {
          if (this.editHighlighted < 0 || this.editHighlighted >= this.editSuggestions.length) return;
          this.selectEditSuggestion(this.editSuggestions[this.editHighlighted]);
        },

        selectEditSuggestion(item) {
          this.editForm.query = item.display_name;
          this.editForm.searchQuery = item.display_name;
          this.editForm.latitude = Number.parseFloat(item.lat);
          this.editForm.longitude = Number.parseFloat(item.lon);
          this.showEditSuggestions = false;
        },

        saveEdit() {
          if (!this.editingStopId) return;
          const idx = this.stops.findIndex((s) => s.id === this.editingStopId);
          if (idx === -1) return;

          const existing = this.stops[idx];
          this.stops[idx] = {
            ...existing,
            title: this.editForm.title.trim() || existing.title,
            description: this.editForm.description.trim() || existing.description,
            zoomLevel: Math.max(2, Math.min(18, Number(this.editForm.zoomLevel) || existing.zoomLevel)),
            latitude: Number.isFinite(this.editForm.latitude) ? this.editForm.latitude : existing.latitude,
            longitude: Number.isFinite(this.editForm.longitude) ? this.editForm.longitude : existing.longitude,
            searchQuery: this.editForm.searchQuery || existing.searchQuery
          };

          this.editingStopId = null;
          this.editSuggestions = [];
          this.showEditSuggestions = false;
          this.syncMapData();
          this.flyToStop(idx, false);
        },

        cancelEdit() {
          this.editingStopId = null;
          this.editSuggestions = [];
          this.showEditSuggestions = false;
        },

        deleteStop(index) {
          if (index < 0 || index >= this.stops.length) return;
          if (!confirm("Remove this stop from the itinerary?")) return;

          this.stops.splice(index, 1);
          if (!this.stops.length) {
            this.activeIndex = -1;
          } else if (this.activeIndex >= this.stops.length) {
            this.activeIndex = this.stops.length - 1;
          }

          this.syncMapData();
          if (this.activeIndex >= 0) this.flyToStop(this.activeIndex, false);
        },

        initSortable() {
          if (!this.$refs.cardsList) return;

          Sortable.create(this.$refs.cardsList, {
            animation: 170,
            handle: ".step-index",
            draggable: "article",
            onEnd: (evt) => {
              const oldIndex = evt.oldIndex;
              const newIndex = evt.newIndex;
              if (oldIndex === newIndex) return;

              const moved = this.stops.splice(oldIndex, 1)[0];
              this.stops.splice(newIndex, 0, moved);

              if (this.activeIndex === oldIndex) {
                this.activeIndex = newIndex;
              } else if (oldIndex < this.activeIndex && newIndex >= this.activeIndex) {
                this.activeIndex -= 1;
              } else if (oldIndex > this.activeIndex && newIndex <= this.activeIndex) {
                this.activeIndex += 1;
              }

              this.syncMapData();
              if (this.activeIndex >= 0) this.flyToStop(this.activeIndex, false);
            }
          });
        }
      },

      mounted() {
        this.initMap();
        this.initSortable();
      }
    }).mount("#app");
  </script>
</body>
</html>
