<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RouteCraft - Interactive Trip Planner</title>

  <!-- External Dependencies -->
  <!-- MapLibre GL JS: Core mapping library -->
  <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />
  <!-- Google Fonts: Icons and Typography -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Tailwind CSS: Utility-first styling framework -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Local Styles -->
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/map.css" />
</head>
<body class="bg-slate-100 text-slate-800">
  <!-- Vue Application Root -->
  <div id="app" class="h-full">
    <!-- Main Layout Grid: Sidebar (Stop List) and Aside (Map) -->
    <div class="grid h-full md:grid-cols-[40%_60%]">

      <!-- MAP SECTION -->
      <aside class="relative order-1 md:order-2 h-full">
        <div id="map" class="relative h-[54vh] w-full md:fixed md:right-0 md:top-0 md:h-full md:w-[60%]"></div>
      </aside>

      <!-- SIDEBAR SECTION -->
      <section class="relative z-20 order-2 md:order-1 h-full overflow-y-auto border-r border-slate-200 bg-slate-50 md:bg-gradient-to-b md:from-slate-50 md:to-slate-100 p-4 pt-4 pb-32 overscroll-contain">
        <div class="mx-auto max-w-2xl">
          <div class="rounded-2xl border border-slate-200 bg-white/90 p-3 shadow-sm md:border-0 md:bg-transparent md:p-0 md:shadow-none">

          <!-- Component: Local Data Restore Toast -->
          <local-data-toast
            :show="showLocalDataToast"
            @restore="restoreLocalData"
            @dismiss="dismissLocalData"
          ></local-data-toast>

          <!-- Header Section -->
          <header class="mb-4">
            <div class="flex items-center gap-3">
              <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-blue-600 text-white shadow-sm">
                <span class="material-symbols-outlined text-2xl leading-none">public</span>
              </div>
              <div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900">RouteCraft</h1>
                <p class="rc-subtitle text-sm text-slate-600">Plan and share trips on an interactive map.</p>
              </div>
            </div>
          </header>

          <!-- Main Controls Sticky Bar -->
          <div class="sticky top-2 z-30 mb-4 rounded-xl border border-slate-200 bg-white/90 p-3 shadow-sm backdrop-blur add-stop-menu">
            <div class="mb-2 flex flex-wrap gap-2">
              <!-- Share Menu Dropdown -->
              <div class="relative share-menu-container">
                <button
                  type="button"
                  class="flex h-9 w-9 items-center justify-center rounded-lg border border-slate-300 bg-white text-sm font-semibold hover:bg-slate-50"
                  @click="shareMenuOpen = !shareMenuOpen"
                  aria-label="Share options"
                  title="Share itinerary"
                >
                  <span class="material-symbols-outlined text-base leading-none">ios_share</span>
                </button>

                <div v-if="shareMenuOpen" class="absolute left-0 top-full z-40 mt-1 w-40 rounded-lg border border-slate-200 bg-white p-1 shadow-lg ring-1 ring-black ring-opacity-5">
                  <button @click="copyShareLink(); shareMenuOpen = false" class="flex w-full items-center gap-2 rounded-md px-3 py-2 text-left text-sm hover:bg-slate-50 text-slate-700">
                    <span class="material-symbols-outlined text-base">link</span>
                    <span>Copy Link</span>
                  </button>
                  <button @click="exportKml(); shareMenuOpen = false" class="flex w-full items-center gap-2 rounded-md px-3 py-2 text-left text-sm hover:bg-slate-50 text-slate-700">
                    <span class="material-symbols-outlined text-base">map</span>
                    <span>Export KML</span>
                  </button>
                </div>
              </div>

              <!-- Import Menu Dropdown -->
              <div class="relative import-menu-container">
                <button
                  type="button"
                  class="flex h-9 w-9 items-center justify-center rounded-lg border border-slate-300 bg-white text-sm font-semibold hover:bg-slate-50"
                  @click="importMenuOpen = !importMenuOpen"
                  aria-label="Import options"
                  title="Import itinerary"
                >
                  <span class="material-symbols-outlined text-base leading-none">download</span>
                </button>

                <div v-if="importMenuOpen" class="absolute left-0 top-full z-40 mt-1 w-40 rounded-lg border border-slate-200 bg-white p-1 shadow-lg ring-1 ring-black ring-opacity-5">
                  <button @click="triggerKmlImport(); importMenuOpen = false" class="flex w-full items-center gap-2 rounded-md px-3 py-2 text-left text-sm hover:bg-slate-50 text-slate-700">
                    <span class="material-symbols-outlined text-base">map</span>
                    <span>Import KML</span>
                  </button>
                  <button @click="multiDayImportOpen = !multiDayImportOpen; importMenuOpen = false" class="flex w-full items-center gap-2 rounded-md px-3 py-2 text-left text-sm hover:bg-slate-50 text-slate-700">
                    <span class="material-symbols-outlined text-base">description</span>
                    <span>Multi-Day Import</span>
                  </button>
                </div>
              </div>

              <div class="h-9 w-px bg-slate-200 mx-1"></div>

              <!-- Navigation Controls -->
              <button
                type="button"
                class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
                :disabled="activeIndex <= 0"
                @click="goPrev"
              >
                Prev
              </button>
              <button
                type="button"
                class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
                :disabled="activeIndex >= stops.length - 1 || stops.length === 0"
                @click="goNext"
              >
                Next
              </button>

              <!-- Add Day Toggles -->
              <button
                type="button"
                class="inline-flex h-9 items-center gap-1.5 rounded-lg border border-blue-200 bg-blue-50 px-3 py-2 text-sm font-semibold text-blue-700 hover:bg-blue-100"
                @click="store.addDay()"
                title="Add day"
              >
                <span class="material-symbols-outlined text-base leading-none">calendar_add_on</span>
                <span>Day</span>
              </button>
            </div>

            <!-- Hidden Input for KML Import -->
            <input
              ref="kmlFileInput"
              type="file"
              accept=".kml,application/vnd.google-earth.kml+xml,application/xml,text/xml"
              class="hidden"
              @change="importKmlFile"
            />
          </div>

          <!-- Itinerary List (Grouped by Day) -->
          <div class="space-y-6">
            <!-- Global Multi-Day Import Menu -->
            <div v-if="multiDayImportOpen" class="px-4 py-4 bg-blue-50/30 rounded-2xl border-2 border-blue-100 border-dashed shadow-sm">
              <div class="mb-3 flex items-center justify-between">
                <h3 class="text-xs font-bold uppercase tracking-widest text-blue-600">Multi-Day Import</h3>
                <button @click="multiDayImportOpen = false" class="text-slate-400 hover:text-slate-600">
                  <span class="material-symbols-outlined text-lg">close</span>
                </button>
              </div>
              <multi-day-import
                :open="true"
                @bulk-add="onComponentBulkAdd"
                @close="multiDayImportOpen = false"
              ></multi-day-import>
            </div>

            <div v-for="day in store.sortedDays" :key="day.id" class="space-y-3">
              <!-- Day Header -->
              <day-header
                :day="day"
                :is-active="store.activeDayId === day.id"
                @toggle-collapse="store.updateDay(day.id, { isCollapsed: !day.isCollapsed })"
                @select-day="store.activeDayId = day.id"
                @update-day="data => store.updateDay(day.id, data)"
                @delete-day="store.deleteDay(day.id)"
                @toggle-add-menu="toggleAddMenuForDay(day.id)"
              ></day-header>

              <!-- Add Place Menu (Specific to this day) -->
              <div v-if="addMenuOpen && activeAddDayId === day.id" class="px-4 py-2 bg-slate-50 rounded-xl border border-blue-100 shadow-inner add-stop-menu">
                <add-stop-menu
                  :open="true"
                  @add-stop="onComponentAddStop"
                  @bulk-add="onComponentBulkAdd"
                  @close="closeAddMenu"
                ></add-stop-menu>
              </div>
              <!-- Day Stops (Sortable) -->
              <div
                v-if="!day.isCollapsed"
                :data-day-id="day.id"
                class="day-stops-list space-y-3 pl-4 border-l-2 border-slate-200 ml-5"
              >
                <place-card
                  v-for="(stop, index) in getStopsForDay(day.id)"
                  :key="stop.id"
                  :stop="stop"
                  :index="index"
                  :active-index="activeStopIndexInDay(stop.id, day.id)"
                  :is-globally-active="stops[activeIndex]?.id === stop.id"
                  :editing-stop-id="editingStopId"
                  :edit-form="editForm"
                  :route-colors="routeColors"
                  @fly-to-stop="() => flyToStop(stop.id)"
                  @set-segment-mode="(mode) => setSegmentMode(stop.id, mode)"
                  @start-edit="startEdit"
                  @delete-stop="() => deleteStop(stop.id)"
                  @save-edit="saveEdit"
                  @cancel-edit="cancelEdit"
                  @select-edit-suggestion="selectEditSuggestion"
                ></place-card>

                <div
                  v-if="getStopsForDay(day.id).length === 0"
                  class="py-4 text-center text-sm text-slate-400 italic rc-exclude-drag"
                  draggable="false"
                >
                  No stops for this day.
                </div>
              </div>
            </div>
          </div>

        </div>
      </section>

    </div>

    <!-- Global Toast Notifications -->
    <transition
      enter-active-class="transform transition ease-out duration-300"
      enter-from-class="translate-y-4 opacity-0"
      enter-to-class="translate-y-0 opacity-100"
      leave-active-class="transition ease-in duration-200"
      leave-from-class="opacity-100"
      leave-to-class="opacity-0"
    >
      <div v-if="toast" class="fixed bottom-6 left-1/2 z-[100] -translate-x-1/2">
        <div
          class="flex items-center gap-3 rounded-2xl px-4 py-3 shadow-xl backdrop-blur border border-white/20 text-white min-w-[280px]"
          :class="toast.type === 'success' ? 'bg-emerald-600/90' : 'bg-slate-800/90'"
        >
          <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-xl bg-white/20">
            <span class="material-symbols-outlined text-lg">
              {{ toast.type === 'success' ? 'check_circle' : 'info' }}
            </span>
          </div>
          <span class="text-sm font-semibold tracking-wide">{{ toast.message }}</span>
        </div>
      </div>
    </transition>
  </div>

  <!-- VUE TEMPLATES (Used by components in js/components/) -->

  <!-- Template for DayHeader.js -->
  <script type="text/x-template" id="day-header-template">
    <div
      class="group sticky top-[72px] z-20 flex flex-col gap-1 rounded-xl border bg-white/95 p-3 shadow-sm backdrop-blur transition-all cursor-pointer"
      :class="isActive ? 'border-blue-400 ring-1 ring-blue-100' : 'border-slate-200'"
      @click="toggleAndSelect"
    >
      <div class="flex items-center justify-between gap-3">
        <div class="flex items-center gap-3 overflow-hidden">
          <div
            class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"
          >
            <span class="material-symbols-outlined">
              {{ day.isCollapsed ? 'chevron_right' : 'expand_more' }}
            </span>
          </div>

          <div class="flex flex-col min-w-0">
            <div class="flex items-center gap-2">
              <span class="text-sm font-bold text-slate-900">{{ formatDate(day.date) }}</span>
              <button
                type="button"
                class="flex h-6 w-6 items-center justify-center rounded-md text-slate-300 hover:bg-slate-100 hover:text-blue-600 transition-all"
                @click.stop="triggerDatePicker"
                title="Change Date"
              >
                <span class="material-symbols-outlined text-base">calendar_today</span>
              </button>
              <input
                ref="dateInput"
                type="date"
                :value="day.date"
                class="sr-only"
                @input="e => $emit('update-day', { date: e.target.value })"
                @click.stop
              />
            </div>
            <input
              type="text"
              :value="day.description"
              placeholder="Add a title for this day..."
              class="bg-transparent text-xs text-slate-500 outline-none placeholder:text-slate-300 focus:text-slate-700"
              @input="e => $emit('update-day', { description: e.target.value })"
              @click.stop
            />
          </div>
        </div>

        <div class="flex shrink-0 items-center gap-1">
          <button
            type="button"
            class="flex h-8 w-8 items-center justify-center rounded-lg text-slate-400 hover:bg-blue-50 hover:text-blue-600 transition-all"
            title="Add Stop to this Day"
            @click.stop="$emit('toggle-add-menu')"
          >
            <span class="material-symbols-outlined text-lg">add_location</span>
          </button>
          <button
            type="button"
            class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg text-slate-400 hover:bg-rose-50 hover:text-rose-600 transition-all"
            title="Delete Day"
            @click.stop="$emit('delete-day')"
          >
            <span class="material-symbols-outlined text-lg">delete</span>
          </button>
        </div>
      </div>
    </div>
  </script>

  <!-- Template for LocalDataToast.js -->
  <script type="text/x-template" id="local-data-toast-template">
    <transition
      enter-active-class="transition ease-out duration-300 transform"
      enter-from-class="translate-y-10 opacity-0"
      enter-to-class="translate-y-0 opacity-100"
      leave-active-class="transition ease-in duration-200 transform"
      leave-from-class="translate-y-0 opacity-100"
      leave-to-class="translate-y-10 opacity-0"
    >
      <div
        v-if="show"
        class="fixed bottom-6 left-1/2 z-[100] w-full max-w-sm -translate-x-1/2 px-4 md:left-auto md:right-6 md:translate-x-0"
      >
        <div class="flex items-center gap-4 rounded-xl border border-slate-200 bg-white p-4 shadow-xl">
          <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-blue-50 text-blue-600">
            <span class="material-symbols-outlined">history</span>
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="text-sm font-semibold text-slate-900 line-clamp-1">Unsaved trip found</h3>
            <p class="text-xs text-slate-500 line-clamp-1">Restore from your last session?</p>
          </div>
          <div class="flex items-center gap-2">
            <button
              type="button"
              class="rounded-lg bg-blue-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-blue-700 transition-colors"
              @click="$emit('restore')"
            >
              Restore
            </button>
            <button
              type="button"
              class="rounded-lg p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"
              @click="$emit('dismiss')"
              aria-label="Dismiss notification"
            >
              <span class="material-symbols-outlined text-lg leading-none">close</span>
            </button>
          </div>
        </div>
      </div>
    </transition>
  </script>

  <!-- Template for PlaceSearch.js -->
  <script type="text/x-template" id="place-search-template">
    <div class="relative" :class="containerClass">
      <input
        v-model="query"
        @input="onInput"
        @focus="showSuggestions = true"
        @keydown.down.prevent="moveSelection(1)"
        @keydown.up.prevent="moveSelection(-1)"
        @keydown.enter.prevent="selectHighlighted"
        @keydown.esc="close"
        :placeholder="placeholder"
        class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2"
      />

      <div
        v-if="showSuggestions && suggestions.length"
        class="absolute z-40 mt-1 max-h-56 w-full overflow-y-auto rounded-lg border border-slate-200 bg-white shadow-lg"
      >
        <button
          v-for="(item, idx) in suggestions"
          :key="item.place_id"
          type="button"
          class="block w-full px-3 py-2 text-left text-sm hover:bg-slate-100"
          :class="idx === highlightedIndex ? 'bg-slate-100' : ''"
          @mousedown.prevent="selectSuggestion(item)"
        >
          {{ item.display_name }}
        </button>
      </div>
    </div>
  </script>

  <!-- Template for MultiDayImport.js -->
  <script type="text/x-template" id="multi-day-import-template">
    <div v-if="open" class="space-y-3">
      <div v-if="detectedPlaces.length === 0" class="space-y-2">
        <p class="text-xs text-slate-500">Paste your itinerary (supports dates and day markers):</p>
        <textarea
          v-model="bulkText"
          rows="8"
          placeholder="e.g.&#10;3/29&#10;Ferry Building&#10;Alcatraz&#10;---&#10;4/1&#10;Lombard Street"
          class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-mono outline-none ring-blue-500 focus:ring-2"
        ></textarea>
        <button
          type="button"
          class="w-full rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
          :disabled="!bulkText.trim() || isGeocoding"
          @click="runBulkGeocode"
        >
          <span v-if="isGeocoding">Processing...</span>
          <span v-else>Next</span>
        </button>
      </div>

      <!-- Review Results -->
      <div v-else class="space-y-3">
        <div class="flex items-center justify-between">
          <p class="text-xs font-semibold text-slate-600">Review Detected Places</p>
          <button type="button" class="text-xs text-blue-600 hover:underline" @click="detectedPlaces = []; bulkText = ''">Back to edit</button>
        </div>

        <div class="max-h-60 space-y-1 overflow-y-auto rounded-lg border border-slate-200 p-1">
          <div
            v-for="(place, idx) in detectedPlaces"
            :key="idx"
            class="flex items-start gap-2 rounded-md p-2 transition-colors hover:bg-slate-50"
            :class="[
              place.selected ? 'bg-blue-50/50' : 'opacity-60',
              place.isDayMarker ? 'border-l-4 border-blue-400 font-semibold bg-blue-50' : ''
            ]"
          >
            <input
              type="checkbox"
              v-model="place.selected"
              :disabled="!place.found"
              class="mt-1 h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500"
            />
            <div class="flex-1 overflow-hidden" @click="place.found && togglePlaceSelection(idx)">
              <div class="flex items-center gap-1.5">
                <span v-if="place.isDayMarker" class="material-symbols-outlined text-sm text-blue-500">calendar_today</span>
                <p class="truncate text-sm font-medium" :class="place.found ? 'text-slate-900' : 'text-slate-400'">{{ place.title }}</p>
              </div>
              <p class="truncate text-[10px] text-slate-500">{{ place.displayName }}</p>
            </div>
            <span v-if="!place.found" class="text-[10px] font-semibold text-red-500">Not found</span>
          </div>
        </div>

        <!-- Replace Option -->
        <div class="flex items-center gap-2 px-1">
          <input
            id="replace-existing-global"
            type="checkbox"
            v-model="replaceExisting"
            class="h-4 w-4 rounded border-slate-300 text-red-600 focus:ring-red-500"
          />
          <label for="replace-existing-global" class="text-xs font-medium text-slate-600 cursor-pointer">Replace existing itinerary</label>
        </div>

        <button
          type="button"
          class="w-full rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
          :disabled="!hasSelectedPlaces"
          @click="addBulkStops"
        >
          Add Selected Places
        </button>
      </div>
    </div>
  </script>

  <!-- Template for AddStopMenu.js -->
  <script type="text/x-template" id="add-stop-menu-template">
    <div v-if="open" class="space-y-3">
      <!-- Tabs -->
      <div class="flex border-b border-slate-200">
        <button
          type="button"
          class="flex-1 px-3 py-2 text-xs font-semibold uppercase tracking-wider outline-none transition-colors"
          :class="currentTab === 'single' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-slate-500 hover:text-slate-700'"
          @click="currentTab = 'single'"
        >
          Single
        </button>
        <button
          type="button"
          class="flex-1 px-3 py-2 text-xs font-semibold uppercase tracking-wider outline-none transition-colors"
          :class="currentTab === 'bulk' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-slate-500 hover:text-slate-700'"
          @click="currentTab = 'bulk'"
        >
          Bulk
        </button>
      </div>

      <!-- Single Add Tab -->
      <div v-if="currentTab === 'single'" class="space-y-2">
        <place-search
          :value="addForm.query"
          placeholder="Search place or address"
          @input="val => addForm.query = val"
          @select="selectAddSuggestion"
        ></place-search>

        <input v-model.trim="addForm.title" placeholder="Title" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2" />
        <textarea v-model.trim="addForm.description" rows="2" placeholder="Description (optional)" class="w-full resize-y rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2"></textarea>

        <div class="flex items-center gap-2">
          <button
            type="button"
            class="rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
            :disabled="!canAddStop"
            @click="addStop"
          >
            Add Place
          </button>
        </div>
      </div>

      <!-- Bulk Import Tab -->
      <div v-if="currentTab === 'bulk'" class="space-y-3">
        <div v-if="detectedPlaces.length === 0" class="space-y-2">
          <p class="text-xs text-slate-500">Paste a list of places (one per line):</p>
          <textarea
            v-model="bulkText"
            rows="6"
            placeholder="e.g.&#10;Ferry Building&#10;Golden Gate Bridge&#10;Ocean Beach"
            class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-mono outline-none ring-blue-500 focus:ring-2"
          ></textarea>
          <button
            type="button"
            class="w-full rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
            :disabled="!bulkText.trim() || isGeocoding"
            @click="runBulkGeocode"
          >
            <span v-if="isGeocoding">Processing...</span>
            <span v-else>Next</span>
          </button>
        </div>

        <!-- Review Results -->
        <div v-else class="space-y-3">
          <div class="flex items-center justify-between">
            <p class="text-xs font-semibold text-slate-600">Review Detected Places</p>
            <button type="button" class="text-xs text-blue-600 hover:underline" @click="detectedPlaces = []; bulkText = ''">Back to edit</button>
          </div>

          <div class="max-h-60 space-y-1 overflow-y-auto rounded-lg border border-slate-200 p-1">
            <div
              v-for="(place, idx) in detectedPlaces"
              :key="idx"
              class="flex items-start gap-2 rounded-md p-2 transition-colors hover:bg-slate-50"
              :class="place.selected ? 'bg-blue-50/50' : 'opacity-60'"
            >
              <input
                type="checkbox"
                v-model="place.selected"
                :disabled="!place.found"
                class="mt-1 h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500"
              />
              <div class="flex-1 overflow-hidden" @click="place.found && togglePlaceSelection(idx)">
                <p class="truncate text-sm font-medium" :class="place.found ? 'text-slate-900' : 'text-slate-400'">{{ place.title }}</p>
                <p class="truncate text-[10px] text-slate-500">{{ place.displayName }}</p>
              </div>
              <span v-if="!place.found" class="text-[10px] font-semibold text-red-500">Not found</span>
            </div>
          </div>

          <button
            type="button"
            class="w-full rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
            :disabled="!hasSelectedPlaces"
            @click="addBulkStops"
          >
            Add Selected Places
          </button>
        </div>
      </div>
    </div>
  </script>

  <!-- Template for PlaceCard.js -->
  <script type="text/x-template" id="place-card-template">
    <article
      :id="'card-' + stop.id"
      class="relative flex items-center gap-4 rounded-2xl border bg-white p-4 shadow transition"
      :class="isGloballyActive ? 'border-blue-300 shadow-blue-100' : 'border-slate-200'"
      @click="$emit('fly-to-stop', index)"
    >
      <!-- Transit Mode Selector (floating above the card) -->
      <div v-if="index > 0" class="absolute -top-5 left-0 right-0 z-10 flex justify-center rc-exclude-drag">
        <div class="flex gap-1 rounded-full border border-slate-200 bg-white p-1 shadow-sm backdrop-blur" @click.stop>
          <button
            v-for="mode in ['auto', 'bicycle', 'pedestrian']"
            :key="mode"
            type="button"
            class="flex h-7 w-7 items-center justify-center rounded-full transition-colors hover:bg-slate-100"
            :class="stop.transportMode === mode ? 'bg-blue-100 text-blue-600' : 'text-slate-400'"
            @click.stop="$emit('set-segment-mode', mode)"
            :title="mode.charAt(0).toUpperCase() + mode.slice(1)"
          >
            <span class="material-symbols-outlined text-base">
              {{ mode === 'auto' ? 'directions_car' : (mode === 'bicycle' ? 'directions_bike' : 'directions_walk') }}
            </span>
          </button>
        </div>
      </div>

      <!-- LEFT: Large Centered Badge -->
      <div
        class="inline-flex h-11 w-11 shrink-0 items-center justify-center rounded-full text-lg font-bold"
        :style="getBadgeStyle(index)"
      >
        {{ index + 1 }}
      </div>

      <!-- RIGHT: Content Column -->
      <div class="flex-1 min-w-0">
        <template v-if="editingStopId !== stop.id">
          <div class="flex items-center justify-between gap-2">
            <h2 class="truncate text-base font-semibold text-slate-900">{{ stop.title }}</h2>
            <div class="flex shrink-0 items-center gap-1">
              <button
                type="button"
                class="inline-flex h-7 w-7 items-center justify-center rounded-md text-slate-400 hover:bg-slate-100 hover:text-blue-600 transition-colors"
                aria-label="Edit stop"
                title="Edit stop"
                @click.stop="$emit('start-edit', stop)"
              >
                <span class="material-symbols-outlined text-lg leading-none">edit</span>
              </button>
              <button
                type="button"
                class="inline-flex h-7 w-7 items-center justify-center rounded-md text-slate-400 hover:bg-rose-50 hover:text-rose-600 transition-colors"
                aria-label="Delete stop"
                title="Delete stop"
                @click.stop="$emit('delete-stop', index)"
              >
                <span class="material-symbols-outlined text-lg leading-none">delete</span>
              </button>
            </div>
          </div>
          <p class="mt-0.5 text-sm text-slate-600 line-clamp-2">{{ stop.description }}</p>
        </template>

        <template v-else>
          <div class="space-y-2" @click.stop>
            <place-search
              :value="editForm.query"
              placeholder="Search new place/address"
              @input="val => editForm.query = val"
              @select="item => $emit('select-edit-suggestion', item)"
            ></place-search>

            <input v-model.trim="editForm.title" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2" />
            <textarea v-model.trim="editForm.description" rows="2" class="w-full resize-y rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2"></textarea>
            <input v-model.number="editForm.zoomLevel" type="number" min="2" max="18" step="0.1" class="w-28 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2" />

            <div class="flex gap-2">
              <button type="button" class="rounded-md bg-blue-600 px-2.5 py-1.5 text-xs font-semibold text-white hover:bg-blue-700" @click="$emit('save-edit')">Save</button>
              <button type="button" class="rounded-md border border-slate-300 px-2.5 py-1.5 text-xs font-semibold hover:bg-slate-50" @click="$emit('cancel-edit')">Cancel</button>
            </div>
          </div>
        </template>
      </div>
    </article>
  </script>

  <!-- Vendor Scripts -->
  <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>

  <!-- RouteCraft Core & Utils (Fundamental) -->
  <script src="js/core/utils.js"></script>
  <script src="js/core/state.js"></script>

  <!-- RouteCraft Services (Logic) -->
  <script src="js/services/storage.js"></script>
  <script src="js/services/kml.js"></script>
  <script src="js/services/itinerary.js"></script>
  <script src="js/services/search.js"></script>
  <script src="js/services/import.js"></script>
  <script src="js/services/routing.js"></script>
  <script src="js/services/map.js"></script>

  <!-- RouteCraft Core (Dependent on Services) -->
  <script src="js/core/store.js"></script>

  <!-- RouteCraft Components -->
  <script src="js/components/PlaceSearch.js"></script>
  <script src="js/components/DayHeader.js"></script>
  <script src="js/components/PlaceCard.js"></script>
  <script src="js/components/AddStopMenu.js"></script>
  <script src="js/components/MultiDayImport.js"></script>
  <script src="js/components/LocalDataToast.js"></script>

  <!-- App Initialization -->
  <script src="js/app.js"></script>
</body>
</html>
