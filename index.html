<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Itinerary Map</title>

  <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/map.css" />
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="app" class="h-full">
    <div class="grid h-full md:grid-cols-[40%_60%]">
      <section class="relative z-20 h-full overflow-y-auto border-r border-slate-200 bg-gradient-to-b from-slate-50 to-slate-100 p-4 pb-32">
        <div class="mx-auto max-w-2xl">
          <header class="mb-3">
            <h1 class="text-2xl font-bold tracking-tight">Travel Itinerary</h1>
            <p class="text-sm text-slate-600">Inline edit stops, search places with autocomplete, and drag to reorder.</p>
          </header>

          <div class="sticky top-2 z-30 mb-4 rounded-xl border border-slate-200 bg-white/90 p-3 shadow-sm backdrop-blur">
            <div class="mb-2 flex gap-2">
              <button
                type="button"
                class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
                :disabled="activeIndex <= 0"
                @click="goPrev"
              >
                Prev
              </button>
              <button
                type="button"
                class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
                :disabled="activeIndex >= stops.length - 1 || stops.length === 0"
                @click="goNext"
              >
                Next
              </button>
            </div>

            <div class="space-y-2">
              <div class="relative">
                <input
                  v-model.trim="addForm.query"
                  @input="onAddQueryInput"
                  @focus="showAddSuggestions = true"
                  @keydown.down.prevent="moveAddSelection(1)"
                  @keydown.up.prevent="moveAddSelection(-1)"
                  @keydown.enter.prevent="selectHighlightedAdd"
                  @keydown.esc="showAddSuggestions = false"
                  placeholder="Search place or address"
                  class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2"
                />

                <div
                  v-if="showAddSuggestions && addSuggestions.length"
                  class="absolute z-40 mt-1 max-h-56 w-full overflow-y-auto rounded-lg border border-slate-200 bg-white shadow-lg"
                >
                  <button
                    v-for="(item, idx) in addSuggestions"
                    :key="item.place_id"
                    type="button"
                    class="block w-full px-3 py-2 text-left text-sm hover:bg-slate-100"
                    :class="idx === addHighlighted ? 'bg-slate-100' : ''"
                    @mousedown.prevent="selectAddSuggestion(item)"
                  >
                    {{ item.display_name }}
                  </button>
                </div>
              </div>

              <input v-model.trim="addForm.title" placeholder="Title" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2" />
              <textarea v-model.trim="addForm.description" rows="2" placeholder="Description" class="w-full resize-y rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2"></textarea>

              <div class="flex items-center gap-2">
                <input v-model.number="addForm.zoomLevel" type="number" min="2" max="18" step="0.1" class="w-28 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2" />
                <button
                  type="button"
                  class="rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
                  :disabled="!canAddStop"
                  @click="addStop"
                >
                  Add Stop
                </button>
              </div>
            </div>
          </div>

          <div ref="cardsList" class="space-y-3">
            <article
              v-for="(stop, index) in stops"
              :key="stop.id"
              :id="`card-${stop.id}`"
              class="rounded-2xl border bg-white p-4 shadow transition"
              :class="index === activeIndex ? 'border-blue-300 shadow-blue-100' : 'border-slate-200'"
              @click="flyToStop(index)"
            >
              <div class="drag-handle mb-2 inline-flex h-7 w-7 items-center justify-center rounded-full bg-blue-50 text-xs font-bold text-blue-700">
                {{ index + 1 }}
              </div>

              <template v-if="editingStopId !== stop.id">
                <h2 class="mb-1 text-lg font-semibold">{{ stop.title }}</h2>
                <p class="text-sm text-slate-600">{{ stop.description }}</p>
                <div class="mt-3 flex gap-2">
                  <button type="button" class="rounded-md border border-slate-300 px-2.5 py-1.5 text-xs font-semibold hover:bg-slate-50" @click.stop="startEdit(stop)">Edit</button>
                  <button type="button" class="rounded-md border border-rose-300 px-2.5 py-1.5 text-xs font-semibold text-rose-700 hover:bg-rose-50" @click.stop="deleteStop(index)">Delete</button>
                </div>
              </template>

              <template v-else>
                <div class="space-y-2" @click.stop>
                  <div class="relative">
                    <input
                      v-model.trim="editForm.query"
                      @input="onEditQueryInput"
                      @focus="showEditSuggestions = true"
                      @keydown.down.prevent="moveEditSelection(1)"
                      @keydown.up.prevent="moveEditSelection(-1)"
                      @keydown.enter.prevent="selectHighlightedEdit"
                      @keydown.esc="showEditSuggestions = false"
                      placeholder="Search new place/address"
                      class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2"
                    />

                    <div
                      v-if="showEditSuggestions && editSuggestions.length"
                      class="absolute z-40 mt-1 max-h-56 w-full overflow-y-auto rounded-lg border border-slate-200 bg-white shadow-lg"
                    >
                      <button
                        v-for="(item, idx) in editSuggestions"
                        :key="item.place_id"
                        type="button"
                        class="block w-full px-3 py-2 text-left text-sm hover:bg-slate-100"
                        :class="idx === editHighlighted ? 'bg-slate-100' : ''"
                        @mousedown.prevent="selectEditSuggestion(item)"
                      >
                        {{ item.display_name }}
                      </button>
                    </div>
                  </div>

                  <input v-model.trim="editForm.title" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2" />
                  <textarea v-model.trim="editForm.description" rows="2" class="w-full resize-y rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2"></textarea>
                  <input v-model.number="editForm.zoomLevel" type="number" min="2" max="18" step="0.1" class="w-28 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring-2" />

                  <div class="flex gap-2">
                    <button type="button" class="rounded-md bg-blue-600 px-2.5 py-1.5 text-xs font-semibold text-white hover:bg-blue-700" @click="saveEdit">Save</button>
                    <button type="button" class="rounded-md border border-slate-300 px-2.5 py-1.5 text-xs font-semibold hover:bg-slate-50" @click="cancelEdit">Cancel</button>
                  </div>
                </div>
              </template>
            </article>
          </div>
        </div>
      </section>

      <aside class="relative h-full">
        <div id="map" class="fixed right-0 top-0 h-full w-full md:w-[60%]"></div>
      </aside>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

  <script src="js/state.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/search.js" defer></script>
  <script src="js/map.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
